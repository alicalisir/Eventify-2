# Flutter recommended lint set
include: package:flutter_lints/flutter.yaml

analyzer:
  plugins:
    - custom_lint

  exclude:
    # Generated files — never lint these
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # ── Safety ──────────────────────────────────────────────────────────────
    avoid_print: true            # Use AppLogger instead of print()
    avoid_dynamic_calls: true    # Disallows .foo on dynamic values
    cancel_subscriptions: true   # StreamSubscription must be cancelled
    close_sinks: true            # IOSink / Sink must be closed

    # ── Style ───────────────────────────────────────────────────────────────
    prefer_single_quotes: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_fields: true
    prefer_final_locals: true
    unnecessary_string_interpolations: true
    unnecessary_this: true
    use_super_parameters: true

    # ── Imports ─────────────────────────────────────────────────────────────
    directives_ordering: true    # dart: → package: → relative

# ── Custom lint rules ───────────────────────────────────────────────────────
# Both rules are enabled by default when the plugin is active.
# To disable project-wide:
#   custom_lint:
#     rules:
#       - no_raw_spacing_literals: false
#
# To suppress a single line: // ignore: no_raw_spacing_literals
# To suppress an entire file: // ignore_for_file: no_raw_spacing_literals
